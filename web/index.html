<style>
  body{
    margin: 0;
    padding: 0;
    font-family: 'Roboto', sans-serif;
    background-color: black;
    transition: background-color 0.5s;
  }

  @keyframes breathing {
    0% { opacity: 0.35; }
    50% { opacity: 0.85; }
    100% { opacity: 0.35; }
  }

  .yls-background-container {
    position: absolute;
    left: 0;
    top: 0;
    width: 100vw;
    height: 100vh;
    z-index: -100000;
    background-color: #181817;
    display: flex;
    justify-content: center;
    animation: breathing 4s ease-in-out infinite;
  }

  .yls-background-container img {
    width: 100vw;
    margin: auto;
    display: block;
  }

  .flutter-loader {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #000 !important;
  }
  .indeterminate::before {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    border-color: black !important;
    color: #000;
    background-color: #fe725d !important;
  }
  .indeterminate::after {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    border-color: black !important;
    color: #000;
    background-color: #fe725d !important;
  }
    .flutter-loading img {
        width: 100px;
    }
</style>
</head>
<body>
<div class="yls-background-container">
  <img src="assets/msc/images/ys_logo.png" alt="Y Lift Store" style="width: 35vw; height: auto;">
</div>
 <script src="/flutter_bootstrap.js" async></script>
</body>
